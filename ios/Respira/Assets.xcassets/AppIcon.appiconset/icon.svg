<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b2e"/>
      <stop offset="100%" style="stop-color:#242640"/>
    </linearGradient>
    <radialGradient id="ring" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#6b7bc4"/>
      <stop offset="70%" style="stop-color:#4a5490"/>
      <stop offset="100%" style="stop-color:#1a1b2e;stop-opacity:0.3"/>
    </radialGradient>
    <radialGradient id="core" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#a8b5f0"/>
      <stop offset="100%" style="stop-color:#7c9ff5"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="coreGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="512" cy="512" r="320" fill="url(#ring)" filter="url(#glow)" opacity="0.9"/>
  <!-- Anchor ring -->
  <circle cx="512" cy="512" r="160" fill="none" stroke="#7c9ff5" stroke-width="3" opacity="0.4"/>
  <!-- Core circle -->
  <circle cx="512" cy="512" r="140" fill="url(#core)" filter="url(#coreGlow)"/>
  <!-- "R" letter -->
  <text x="512" y="545" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="160" fill="#1a1b2e" opacity="0.85">R</text>
</svg>
